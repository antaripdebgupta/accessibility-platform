<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ report_title }}</title>
    <style>
      /* css-lint-disable */
      /* Add your CSS styles here */
    </style>
  </head>
  <body>
    <div class="page-header">
      <table width="100%" style="border: none">
        <tr>
          <td style="border: none; padding: 0">
            <h1 style="margin: 0; font-size: 20px; color: #1e3a5f">
              Accessibility Conformance Report
            </h1>
            <p style="margin: 4px 0 0; font-size: 12px; color: #6b7280">
              WCAG {{ verdict.wcag_version }} Level {{ verdict.conformance_level
              }} Evaluation
            </p>
          </td>
          <td
            style="
              border: none;
              padding: 0;
              text-align: right;
              font-size: 11px;
              color: #6b7280;
            "
          >
            Generated: {{ verdict.generated_at }}<br />
            A11y Platform v0.1.0
          </td>
        </tr>
      </table>
    </div>

    {% block content %}{% endblock %}

    <div class="page-footer">
      {{ verdict.evaluation_title }} · {{ verdict.target_url }} · WCAG-EM
      Evaluation Report
    </div>
  </body>
</html>
