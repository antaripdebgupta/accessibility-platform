# Nginx Development Server Configuration
# Proxies to Vite dev server + FastAPI

client_max_body_size 50M;

# Upstream servers
upstream api {
    server api:8000;
}

upstream vite {
    server frontend:5173;
}

upstream minio {
    server minio:9000;
}

server {
    listen 80;
    server_name _;

    # Proxy API requests to FastAPI
    location /api/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Proxy MinIO storage requests (for presigned URLs)
    location /storage/ {
        rewrite            ^/storage/(.*)$ /$1 break;
        proxy_pass         http://minio;
        proxy_http_version 1.1;
        proxy_set_header   Host              minio:9000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering    off;
    }

    # SSE endpoint — disable buffering
    location /api/v1/events/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # WebSocket for Vite HMR
    location /__vite_hmr {
        proxy_pass         http://vite;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # All other requests go to Vite dev server
    location / {
        proxy_pass         http://vite;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support for HMR
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
